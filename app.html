        body: JSON.stringify({
          max_tokens: 1000,
          system: buildPracticePrompt(),
          messages: transcript
        })
      });
      const data = await response.json();
      const reply = data.content.map(i => i.text || "").join("");
      setPracticeMessages(prev => [...prev, { role: "client", content: reply }]);
    } catch (err) {
      console.error("Practice simulation error:", err);
      setPracticeMessages(prev => [...prev, { role: "client", content: "I'm sorry, can you repeat that? I got distracted for a moment." }]);

    const persona = PERSONAS.find(p => p.id === practicePersona);
    const transcript = practiceMessages.map(m => `${m.role === "agent" ? "AGENT" : "CLIENT"}: ${m.content}`).join("\n\n");

    try {
      const response = await fetch(API_URL + "/ai/generate", {

}`

      const text = data.content.map(i => i.text || "").join("");

      try {

          method: "POST",

            difficulty: practiceDifficulty,

          })

        const sessionData = await sessionRes.json();
        if (sessionRes.ok) {
          // Add all turns
          for (const msg of practiceMessages) {

                        }}>
                          <div style={{ fontSize: 32, fontWeight: 700, color: dim.color, fontFamily: "'DM Mono', monospace" }}>{dim.score}</div>
                          <div style={{ fontSize: 10, color: "rgba(226,224,219,0.35)", fontFamily: "'DM Mono', monospace", letterSpacing: "0.08em", textTransform: "uppercase", marginTop: 4 }}>{dim.label}</div>
                        </div>
                      ))}
                    </div>

                    <div style={{ marginBottom: 24 }}>
                      <div style={{ fontSize: 10, color: "#10b981", fontFamily: "'DM Mono', monospace", letterSpacing: "0.12em", textTransform: "uppercase", marginBottom: 10, fontWeight: 600 }}>Strengths</div>
                      {practiceFeedback.strengths.map((s, i) => (
                        <div key={i} style={{ fontSize: 14, color: "rgba(226,224,219,0.7)", marginBottom: 6, paddingLeft: 16, borderLeft: "2px solid rgba(16,185,129,0.3)", lineHeight: 1.6 }}>{s}</div>
                      ))}
                    </div>

                    <div style={{ marginBottom: 24 }}>
                      <div style={{ fontSize: 10, color: "#f59e0b", fontFamily: "'DM Mono', monospace", letterSpacing: "0.12em", textTransform: "uppercase", marginBottom: 10, fontWeight: 600 }}>Areas to Improve</div>
                      {practiceFeedback.improvements.map((s, i) => (
                        <div key={i} style={{ fontSize: 14, color: "rgba(226,224,219,0.7)", marginBottom: 6, paddingLeft: 16, borderLeft: "2px solid rgba(245,158,11,0.3)", lineHeight: 1.6 }}>{s}</div>
                      ))}
                    </div>

                    <div style={{
                      padding: "16px 20px", borderRadius: 12,
                      background: "rgba(224,90,51,0.04)", border: "1px solid rgba(224,90,51,0.1)",
                      marginBottom: 24
                    }}>
                      <div style={{ fontSize: 10, color: "#e05a33", fontFamily: "'DM Mono', monospace", letterSpacing: "0.12em", textTransform: "uppercase", marginBottom: 8, fontWeight: 600 }}>Try This Phrasing</div>
                      <div style={{ fontSize: 14, color: "rgba(226,224,219,0.65)", lineHeight: 1.65, fontStyle: "italic" }}>{practiceFeedback.suggestedPhrasing}</div>
                    </div>

                    <div style={{
                      padding: "16px 20px", borderRadius: 12,
                      background: "rgba(59,130,246,0.04)", border: "1px solid rgba(59,130,246,0.1)",
                      marginBottom: 32
                    }}>
                      <div style={{ fontSize: 10, color: "#3b82f6", fontFamily: "'DM Mono', monospace", letterSpacing: "0.12em", textTransform: "uppercase", marginBottom: 8, fontWeight: 600 }}>Next Practice Focus</div>
                      <div style={{ fontSize: 14, color: "rgba(226,224,219,0.65)", lineHeight: 1.65 }}>{practiceFeedback.nextFocus}</div>
                    </div>

                    <div style={{ display: "flex", gap: 12 }}>
                      <button onClick={() => { setPracticeState("active"); setPracticeMessages([]); setPracticeFeedback(null); }} style={{
                        padding: "12px 28px", borderRadius: 10, border: "none",
                        background: "#e05a33", color: "#fff", fontSize: 13, fontWeight: 700,
                        fontFamily: "'DM Mono', monospace", cursor: "pointer"
                      }}>
                        Practice Again
                      </button>
                      <button onClick={() => { setPracticeState("setup"); setPracticeMessages([]); setPracticeFeedback(null); setPracticeScenario(null); setPracticePersona(null); }} style={{
                        padding: "12px 28px", borderRadius: 10,
                        border: "1px solid rgba(255,255,255,0.1)",
                        background: "transparent", color: "rgba(226,224,219,0.5)",
                        fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: "inherit"
                      }}>
                        New Scenario
                      </button>
                    </div>
                  </>
                )}
              </div>
            </div>
          )}
        </div>
        )}

        {appMode === "myscript" && (
        <div style={{ flex: 1, overflowY: "auto", padding: "32px 40px" }}>
          <div style={{ maxWidth: 700, margin: "0 auto" }}>
            <div style={{ marginBottom: 36 }}>
              <div style={{ fontSize: 10, color: "#d4a03e", fontFamily: "'DM Mono', monospace", letterSpacing: "0.16em", textTransform: "uppercase", marginBottom: 12 }}>Personal Value Script</div>
              <h2 style={{ fontSize: 28, fontWeight: 700, color: "#f5f3ee", marginBottom: 8, fontFamily: "'Space Grotesk', sans-serif" }}>
                {vsStep < 4 ? "Build Your Script" : "Your Value Script"}
              </h2>
              <p style={{ fontSize: 14, color: "rgba(226,224,219,0.5)" }}>
                {vsStep < 4 ? "Answer three questions. Get a script that sounds like you — not a template." : "Use these everywhere — listing appointments, networking, social media, cold calls."}
              </p>
            </div>

            {vsStep < 4 && (
              <div style={{ display: "flex", gap: 8, marginBottom: 36 }}>
                {[1, 2, 3].map(s => (
                  <div key={s} style={{ flex: 1, height: 4, borderRadius: 2, background: s <= vsStep ? "#d4a03e" : "rgba(255,255,255,0.06)", transition: "background 0.3s" }} />
                ))}
              </div>
            )}

            {vsStep === 1 && (
              <div>
                <div style={{ fontSize: 12, color: "#d4a03e", fontFamily: "'DM Mono', monospace", letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 16, fontWeight: 600 }}>Step 1 — Who You Serve</div>
                <div style={{ marginBottom: 20 }}>
                  <label style={{ display: "block", fontSize: 14, color: "#f5f3ee", fontWeight: 600, marginBottom: 8 }}>What's your favorite type of transaction?</label>
                  <p style={{ fontSize: 12, color: "rgba(226,224,219,0.4)", marginBottom: 10, lineHeight: 1.5 }}>Think about the deal that made you proudest. First-time buyers? Luxury listings? Relocations?</p>
                  <input type="text" value={vsFavoriteTransaction} onChange={e => setVsFavoriteTransaction(e.target.value)} placeholder="e.g., Helping first-time buyers find their first home" style={{ width: "100%", padding: "12px 16px", background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 10, color: "#e2e0db", fontSize: 14, fontFamily: "inherit", outline: "none", boxSizing: "border-box" }} />
                </div>
                <div style={{ marginBottom: 20 }}>
                  <label style={{ display: "block", fontSize: 14, color: "#f5f3ee", fontWeight: 600, marginBottom: 8 }}>Who is your ideal client?</label>
                  <p style={{ fontSize: 12, color: "rgba(226,224,219,0.4)", marginBottom: 10, lineHeight: 1.5 }}>Describe who you love working with. The more specific, the sharper your script.</p>
                  <input type="text" value={vsIdealClient} onChange={e => setVsIdealClient(e.target.value)} placeholder="e.g., Young families moving from the city to suburbs for better schools" style={{ width: "100%", padding: "12px 16px", background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 10, color: "#e2e0db", fontSize: 14, fontFamily: "inherit", outline: "none", boxSizing: "border-box" }} />
                </div>
                <div style={{ marginBottom: 28 }}>
                  <label style={{ display: "block", fontSize: 14, color: "#f5f3ee", fontWeight: 600, marginBottom: 8 }}>What market or area do you work in?</label>
                  <input type="text" value={vsMarket} onChange={e => setVsMarket(e.target.value)} placeholder="e.g., North Dallas suburbs, Frisco, McKinney" style={{ width: "100%", padding: "12px 16px", background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 10, color: "#e2e0db", fontSize: 14, fontFamily: "inherit", outline: "none", boxSizing: "border-box" }} />
                </div>
                <button onClick={() => setVsStep(2)} disabled={!vsFavoriteTransaction.trim() || !vsIdealClient.trim()} style={{ padding: "12px 32px", borderRadius: 10, border: "none", background: (!vsFavoriteTransaction.trim() || !vsIdealClient.trim()) ? "rgba(212,160,62,0.2)" : "#d4a03e", color: (!vsFavoriteTransaction.trim() || !vsIdealClient.trim()) ? "rgba(212,160,62,0.5)" : "#000", fontSize: 14, fontWeight: 700, fontFamily: "'DM Mono', monospace", cursor: (!vsFavoriteTransaction.trim() || !vsIdealClient.trim()) ? "not-allowed" : "pointer" }}>Next →</button>
              </div>
            )}

            {vsStep === 2 && (
              <div>
                <div style={{ fontSize: 12, color: "#d4a03e", fontFamily: "'DM Mono', monospace", letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 16, fontWeight: 600 }}>Step 2 — The Problem You Solve</div>
                <div style={{ marginBottom: 20 }}>
                  <label style={{ display: "block", fontSize: 14, color: "#f5f3ee", fontWeight: 600, marginBottom: 8 }}>What's the biggest problem your clients face before they find you?</label>
                  <p style={{ fontSize: 12, color: "rgba(226,224,219,0.4)", marginBottom: 10, lineHeight: 1.5 }}>What keeps them up at night? The fear, the frustration, the thing they can't figure out alone.</p>
                  <textarea value={vsProblem} onChange={e => setVsProblem(e.target.value)} placeholder="e.g., They're overwhelmed, don't know what they can afford, and terrified of making a mistake on the biggest purchase of their life" style={{ width: "100%", minHeight: 100, padding: "12px 16px", background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 10, color: "#e2e0db", fontSize: 14, fontFamily: "inherit", lineHeight: 1.6, outline: "none", resize: "vertical", boxSizing: "border-box" }} />
                </div>
                <div style={{ display: "flex", gap: 10 }}>
                  <button onClick={() => setVsStep(1)} style={{ padding: "12px 24px", borderRadius: 10, border: "1px solid rgba(255,255,255,0.1)", background: "transparent", color: "rgba(226,224,219,0.5)", fontSize: 13, cursor: "pointer", fontFamily: "inherit" }}>← Back</button>
                  <button onClick={() => setVsStep(3)} disabled={!vsProblem.trim()} style={{ padding: "12px 32px", borderRadius: 10, border: "none", background: !vsProblem.trim() ? "rgba(212,160,62,0.2)" : "#d4a03e", color: !vsProblem.trim() ? "rgba(212,160,62,0.5)" : "#000", fontSize: 14, fontWeight: 700, fontFamily: "'DM Mono', monospace", cursor: !vsProblem.trim() ? "not-allowed" : "pointer" }}>Next →</button>
                </div>
              </div>
            )}

            {vsStep === 3 && (
              <div>
                <div style={{ fontSize: 12, color: "#d4a03e", fontFamily: "'DM Mono', monospace", letterSpacing: "0.1em", textTransform: "uppercase", marginBottom: 16, fontWeight: 600 }}>Step 3 — Your Results</div>
                <div style={{ marginBottom: 20 }}>
                  <label style={{ display: "block", fontSize: 14, color: "#f5f3ee", fontWeight: 600, marginBottom: 8 }}>What measurable result do you deliver?</label>
                  <p style={{ fontSize: 12, color: "rgba(226,224,219,0.4)", marginBottom: 10, lineHeight: 1.5 }}>Numbers are powerful. Sale-to-list ratio, days on market, homes sold — whatever proves your value.</p>
                  <input type="text" value={vsResult} onChange={e => setVsResult(e.target.value)} placeholder="e.g., My sellers average 99.3% of list price" style={{ width: "100%", padding: "12px 16px", background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 10, color: "#e2e0db", fontSize: 14, fontFamily: "inherit", outline: "none", boxSizing: "border-box" }} />
                </div>
                <div style={{ marginBottom: 28 }}>
                  <label style={{ display: "block", fontSize: 14, color: "#f5f3ee", fontWeight: 600, marginBottom: 8 }}>In what timeframe?</label>
                  <p style={{ fontSize: 12, color: "rgba(226,224,219,0.4)", marginBottom: 10, lineHeight: 1.5 }}>How quickly do you get results? This creates urgency and credibility.</p>
                  <input type="text" value={vsTimeframe} onChange={e => setVsTimeframe(e.target.value)} placeholder="e.g., Average 11 days on market, 40% faster than area average" style={{ width: "100%", padding: "12px 16px", background: "rgba(255,255,255,0.04)", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 10, color: "#e2e0db", fontSize: 14, fontFamily: "inherit", outline: "none", boxSizing: "border-box" }} />
                </div>
                <div style={{ display: "flex", gap: 10 }}>
                  <button onClick={() => setVsStep(2)} style={{ padding: "12px 24px", borderRadius: 10, border: "1px solid rgba(255,255,255,0.1)", background: "transparent", color: "rgba(226,224,219,0.5)", fontSize: 13, cursor: "pointer", fontFamily: "inherit" }}>← Back</button>
                  <button onClick={generateValueScript} disabled={!vsResult.trim() || vsGenerating} style={{ padding: "12px 32px", borderRadius: 10, border: "none", background: (!vsResult.trim() || vsGenerating) ? "rgba(212,160,62,0.2)" : "#d4a03e", color: (!vsResult.trim() || vsGenerating) ? "rgba(212,160,62,0.5)" : "#000", fontSize: 14, fontWeight: 700, fontFamily: "'DM Mono', monospace", cursor: (!vsResult.trim() || vsGenerating) ? "not-allowed" : "pointer" }}>{vsGenerating ? "Generating..." : "Build My Script →"}</button>
                </div>
              </div>
            )}

            {vsStep === 4 && vsGeneratedScript && (
              <div>
                {[
                  { key: "elevatorPitch", label: "Elevator Pitch", desc: "Networking, open houses, social events", color: "#d4a03e" },
                  { key: "listingOpener", label: "Listing Appointment Opener", desc: "Start your next listing appointment with this", color: "#e05a33" },
                  { key: "socialBio", label: "Social Media Bio", desc: "Instagram, LinkedIn, your website", color: "#10b981" },
                  { key: "coldCallHook", label: "Cold Call Hook", desc: "First 10 seconds of any prospecting call", color: "#3b82f6" },
                  { key: "objectionAnchor", label: "\"Why Should I Work With You?\"", desc: "Your anchor for the most important question", color: "#8b5cf6" }
                ].map(({ key, label, desc, color }) => (
                  <div key={key} style={{ marginBottom: 20, padding: "20px 24px", borderRadius: 14, background: "rgba(255,255,255,0.02)", border: "1px solid rgba(255,255,255,0.06)", borderLeft: `3px solid ${color}` }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 8 }}>
                      <div>
                        <div style={{ fontSize: 15, fontWeight: 600, color: "#f5f3ee" }}>{label}</div>
                        <div style={{ fontSize: 11, color: "rgba(226,224,219,0.35)", marginTop: 2 }}>{desc}</div>
                      </div>
                      <button onClick={() => { navigator.clipboard.writeText(vsGeneratedScript[key]); setVsCopied(key); setTimeout(() => setVsCopied(null), 2000); }} style={{ padding: "5px 14px", borderRadius: 6, border: `1px solid ${vsCopied === key ? "rgba(16,185,129,0.3)" : "rgba(255,255,255,0.1)"}`, background: vsCopied === key ? "rgba(16,185,129,0.08)" : "rgba(255,255,255,0.03)", color: vsCopied === key ? "#10b981" : "rgba(226,224,219,0.4)", fontSize: 10, fontWeight: 600, fontFamily: "'DM Mono', monospace", cursor: "pointer", flexShrink: 0 }}>{vsCopied === key ? "✓ Copied" : "Copy"}</button>
                    </div>
                    <div style={{ fontSize: 14, lineHeight: 1.7, color: "rgba(226,224,219,0.7)", whiteSpace: "pre-wrap" }}>{vsGeneratedScript[key]}</div>
                  </div>
                ))}
                <div style={{ marginBottom: 28, padding: "20px 24px", borderRadius: 14, background: "rgba(212,160,62,0.04)", border: "1px solid rgba(212,160,62,0.12)" }}>
                  <div style={{ fontSize: 10, color: "#d4a03e", fontFamily: "'DM Mono', monospace", letterSpacing: "0.12em", textTransform: "uppercase", marginBottom: 10, fontWeight: 600 }}>Coaching Notes</div>
                  <div style={{ fontSize: 14, lineHeight: 1.7, color: "rgba(226,224,219,0.65)" }}>{vsGeneratedScript.coachingNotes}</div>
                </div>
                <div style={{ display: "flex", gap: 12 }}>
                  <button onClick={() => { setVsStep(1); setVsGeneratedScript(null); }} style={{ padding: "12px 28px", borderRadius: 10, border: "1px solid rgba(255,255,255,0.1)", background: "transparent", color: "rgba(226,224,219,0.5)", fontSize: 13, fontWeight: 600, cursor: "pointer", fontFamily: "inherit" }}>Start Over</button>
                  <button onClick={() => { setAppMode("practice"); setPracticeState("setup"); }} style={{ padding: "12px 28px", borderRadius: 10, border: "none", background: "#e05a33", color: "#fff", fontSize: 13, fontWeight: 700, fontFamily: "'DM Mono', monospace", cursor: "pointer" }}>Practice Delivering It →</button>
                </div>
              </div>
            )}
          </div>
        </div>
        )}

        {showCustom && (
          <div style={S.modal} onClick={e => e.target === e.currentTarget && setShowCustom(false)}>
            <div style={S.modalContent}>
              <h3 style={{ margin: 0, fontSize: 22, fontWeight: 700, color: "#f5f3ee", letterSpacing: "-0.01em" }}>
                Get Primed on Any Scenario
              </h3>
              <p style={{ fontSize: 13, color: "rgba(226,224,219,0.4)", marginTop: 8, lineHeight: 1.5 }}>
                Describe what's happening and we'll generate your full briefing — impact analysis, talk tracks, and client scripts.
              </p>
              <textarea
                value={customPrompt}
                onChange={e => setCustomPrompt(e.target.value)}
                placeholder="e.g., What if Amazon announces a new HQ in Austin, TX?"
                style={S.textarea}
                disabled={isGenerating}
              />
              <div style={S.modalBtns}>
                <button
                  style={{
                    padding: "10px 24px", borderRadius: 8,
                    border: "1px solid rgba(255,255,255,0.1)",
                    background: "transparent", color: "rgba(226,224,219,0.4)",
                    fontSize: 13, cursor: "pointer", fontFamily: "inherit"
                  }}
                  onClick={() => { setShowCustom(false); setCustomPrompt(""); }}
                  disabled={isGenerating}
                >
                  Cancel
                </button>
                <button
                  style={{
                    padding: "10px 24px", borderRadius: 8, border: "none",
                    background: isGenerating ? "rgba(224,90,51,0.2)" : "#e05a33",
                    color: isGenerating ? "#e05a33" : "#fff",
                    fontSize: 13, fontWeight: 700, cursor: isGenerating ? "wait" : "pointer",
                    fontFamily: "'DM Mono', monospace", letterSpacing: "0.02em",
                    transition: "all 0.2s"
                  }}
                  onClick={generateScenario}
                  disabled={isGenerating || !customPrompt.trim()}
                >
                  {isGenerating ? "Analyzing..." : "Get Primed"}
                </button>
              </div>
            </div>
          </div>
        )}
      </div>
      )}
    </>
  );
}

    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(Primed));
    
    // Register service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
  </script>
</body>
</html>
